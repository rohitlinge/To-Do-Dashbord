<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

    <div class="main">
<div class="cards" >
    <div class="card" id="0">
        <img src="\icons8-to-do-list-100.png">
        <h2 id="0">To Do List</h2 >
    </div>
    <div class="card" id="1">
        <img src="\icons8-notes-96.png">
        <h2 id="1">Daily Planner</h2>

    </div>
    <div class="card" id="2">
        <img src="\icons8-motivation-100.png">
        <h2 id="2">Motivation</h2>

    </div>
    <div class="card" id="3">
        <img src="\icons8-pending-100.png">
        <h2 id="3">Prmodoro Timer</h2>
    </div>
        <div class="card" id="4">
            <img src="\icons8-taskbar-100.png">
        <h2 id="3">Daily Gols</h2>
    </div>
    </div>
    <div class="pages">
<div class="page" id="page-0"><button class="back" id="0">Back</button><h1>To Do List</h1>
<div class="todomain" >
<form class="todoadd" id="form">
<input class="addtodolistname" id="addtodolistname" type="text" placeholder="Task Title">
<input id="addtodolistdec" class="addtodolistdec" type="text" placeholder="Task Description">
<div class="marktaskimp">
<input type="checkbox" id="checkbox"> 
<lable for="checkboxlable" id="lable">Mark As a IMP</lable>
</div>
<button class="addtodosub" id="addtodosub">Add Task</button>
</form> 
<div class="todoview" id="todoview">

</div>
</div>
</div>
<div class="page" id="page-1"><button class="back" id="1">Back</button><h1>Daily Planner</h1></div>
<div class="page" id="page-2"><button class="back" id="2">Back</button><h1>Motivation</h1></div>
<div class="page" id="page-3"><button class="back" id="3">Back</button><h1>Prmodoro Timer</h1></div>
<div class="page" id="page-4"><button class="back" id="4">Back</button><h1>Daily Gols</h1></div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
